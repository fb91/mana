<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Fondo -->
  <rect width="512" height="512" rx="100" fill="#FAF7F2"/>

  <!-- Cáliz estilizado -->
  <g transform="translate(256, 256)">
    <!-- Copa del cáliz -->
    <path d="M-80,-100 Q-80,60 -40,80 L-20,100 L20,100 L40,80 Q80,60 80,-100 Z"
          fill="#8B6914" opacity="0.15"/>
    <path d="M-80,-100 Q-80,60 -40,80 L-20,100 L20,100 L40,80 Q80,60 80,-100 Z"
          fill="none" stroke="#8B6914" stroke-width="6"/>

    <!-- Pie del cáliz -->
    <rect x="-8" y="100" width="16" height="50" fill="#8B6914"/>
    <ellipse cx="0" cy="155" rx="40" ry="10" fill="#8B6914"/>

    <!-- Llama / hostia en el cáliz -->
    <ellipse cx="0" cy="-10" rx="35" ry="15" fill="#D4A853" opacity="0.8"/>

    <!-- Cruz pequeña sobre la hostia -->
    <rect x="-2" y="-22" width="4" height="18" fill="#8B6914"/>
    <rect x="-8" y="-18" width="16" height="4" fill="#8B6914"/>
  </g>

  <!-- Texto "Maná" -->
  <text x="256" y="430"
        font-family="Georgia, serif"
        font-size="64"
        font-weight="bold"
        fill="#8B6914"
        text-anchor="middle">
    Maná
  </text>
</svg>
