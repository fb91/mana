<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#8B6914" />
    <meta name="description" content="Tu compañero espiritual diario — Maná" />

    <!-- Splash screen: se oculta automáticamente cuando React termina de montar -->
    <style>
      #splash-screen {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #FAF7F2;
        opacity: 1;
        transition: opacity 0.35s ease;
      }
      /* Modo oscuro: usa el mismo color de fondo que la app */
      html.dark #splash-screen {
        background: #1C1510;
      }
      /* Estado final antes de eliminarlo del DOM */
      #splash-screen.splash-hidden {
        opacity: 0;
        pointer-events: none;
      }
      .splash-spinner {
        width: 44px;
        height: 44px;
        border: 3px solid rgba(139, 105, 20, 0.2);
        border-top-color: #8B6914;
        border-radius: 50%;
        animation: splash-spin 0.75s linear infinite;
      }
      .splash-label {
        margin-top: 14px;
        font-family: Georgia, serif;
        font-size: 13px;
        letter-spacing: 0.08em;
        color: #8B6914;
      }
      @keyframes splash-spin {
        to { transform: rotate(360deg); }
      }
    </style>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" sizes="192x192" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- No Flash of Unstyled Dark Mode -->
    <script>
      // Aplicar tema oscuro por defecto
      try {
        const store = JSON.parse(localStorage.getItem('mana-store') || '{}');
        const theme = store?.state?.theme || 'oscuro';
        if (theme === 'oscuro') document.documentElement.classList.add('dark');
      } catch {
        // Default a oscuro si hay error
        document.documentElement.classList.add('dark');
      }
    </script>

    <title>Maná</title>
  </head>
  <body class="bg-crema dark:bg-oscuro-bg">
    <!-- Splash screen: visible hasta que React termine de iniciar -->
    <div id="splash-screen" aria-hidden="true" role="presentation">
      <div class="splash-spinner"></div>
      <p class="splash-label">Cargando…</p>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
