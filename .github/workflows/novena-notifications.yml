name: Novena Notifications

on:
  # El cron automático está manejado por cron-job.org (cada 15 min, más confiable).
  # Este workflow queda solo para ejecución manual — útil para debugging.
  workflow_dispatch:

jobs:
  send-notifications:
    runs-on: ubuntu-latest
    steps:
      - name: Send push notifications
        run: |
          curl -s -X POST "${{ secrets.APP_URL }}/api/notifications/send" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --fail-with-body
